name: ai_study_vault_pro
description: "منصة AI Study Vault Pro - النسخة الاحترافية الكاملة"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Firebase & Cloud ---
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0
  cloud_functions: ^4.6.0

  # --- Network & API ---
  http: ^1.1.0
  dio: ^5.3.0

  # --- UI & Design ---
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  font_awesome_flutter: ^10.6.0

  # --- State Management ---
  flutter_riverpod: ^2.4.0

  # --- Storage & Data ---
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # --- Tools ---
  intl: ^0.19.0
  uuid: ^4.0.0
  logger: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
